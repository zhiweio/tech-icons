# Enrichments: Manual alias and tag mappings for cross-vendor icon search
#
# Maps common technology terms to icon IDs across ALL vendors (cloud + on-prem + open source).
# Used by the build pipeline to augment the keyword index with semantic aliases.
#
# Each alias key is a concept group name; compare_icons(concept) returns all vendor icons.

